# octopOS Sandbox Security Configuration
# Security policies for ephemeral worker containers

# File System Security
READ_ONLY_PATHS="/usr,/bin,/sbin,/lib,/lib64"
WRITEABLE_PATHS="/workspace,/tmp"
FORBIDDEN_PATHS="/proc,/sys,/dev"

# Network Security
NETWORK_MODE="none"  # Options: none, bridge, host (not recommended)
ALLOWED_PORTS=""
BLOCKED_PORTS="22,23,25,53,80,443"  # Blocked even in bridge mode

# Process Security
MAX_PROCESSES=100
MAX_OPEN_FILES=1024
MAX_THREADS=50
FORBIDDEN_SYSCALLS="execve,ptrace,process_vm_writev"

# User Security
RUN_AS_NON_ROOT=true
DROP_CAPABILITIES="ALL"
ADD_CAPABILITIES=""

# Resource Security
PREVENT_ESCAPE=true
NO_NEW_PRIVILEGES=true
SECURE_COMPUTING_MODE=true

# Environment Security
SANITIZE_ENV=true
ALLOWED_ENV_VARS="PATH,HOME,USER,WORKSPACE_DIR,PYTHONPATH,LC_ALL,LANG"

# Logging
AUDIT_COMMANDS=true
LOG_LEVEL="INFO"
