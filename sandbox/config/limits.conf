# octopOS Sandbox Resource Limits Configuration
# Resource constraints for ephemeral worker containers

# Memory Limits
MAX_MEMORY_MB=512          # Maximum memory per container
MAX_SWAP_MB=512           # Maximum swap space
MEMORY_RESERVATION_MB=128  # Soft memory limit
OOM_KILL_DISABLE=false    # Allow OOM killer

# CPU Limits
MAX_CPU_CORES=1           # Maximum CPU cores
CPU_QUOTA=100000          # CPU quota (usec per 100000 usec)
CPU_PERIOD=100000         # CPU period (usec)
CPU_SHARES=1024          # CPU shares (relative weight)

# Disk Limits
MAX_DISK_SPACE_MB=1024    # Maximum disk space per container
MAX_DISK_INODES=100000    # Maximum inodes
DISK_READ_BPS=10485760    # Disk read bytes per second (10MB/s)
DISK_WRITE_BPS=10485760   # Disk write bytes per second (10MB/s)

# I/O Limits
MAX_IO_OPS=1000           # Maximum I/O operations per second
MAX_FILE_SIZE_MB=100      # Maximum file size
MAX_OPEN_FILES=1024       # Maximum open file descriptors

# Network Limits (if network is enabled)
MAX_NETWORK_BANDWIDTH=1048576  # Max bandwidth (1MB/s)
MAX_CONNECTIONS=50              # Max network connections
MAX_PACKETS_PER_SEC=1000        # Max packets per second

# Time Limits
MAX_EXECUTION_TIME=300    # Maximum execution time in seconds (5 minutes)
MAX_IDLE_TIME=60          # Maximum idle time before cleanup

# Process Limits
MAX_PROCESSES=100         # Maximum number of processes
MAX_THREADS=50           # Maximum number of threads
MAX_PIDS=100             # Maximum PID namespace limit

# Pids limits
PIDS_LIMIT=100

# Ulimits
ULIMIT_NOFILE_SOFT=1024
ULIMIT_NOFILE_HARD=4096
ULIMIT_NPROC_SOFT=100
ULIMIT_NPROC_HARD=200
ULIMIT_STACK_SOFT=8388608    # 8MB
ULIMIT_STACK_HARD=16777216   # 16MB
